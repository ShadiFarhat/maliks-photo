<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maliks Photo Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#C41E3A;--red-hover:#D62B47;--red-subtle:rgba(196,30,58,.06);--red-border:rgba(196,30,58,.15);
  --bg:#F8F7F4;--surface:#FFFFFF;--surface2:#F2F1EE;--surface3:#EBEAE6;
  --text:#18181B;--text2:#52525B;--text3:#A1A1AA;--text4:#D4D4D8;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.12);
  --success:#16A34A;--success-bg:#F0FDF4;--warning:#D97706;--warning-bg:#FFFBEB;--error:#DC2626;--error-bg:#FEF2F2;
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.03);
  --shadow-md:0 4px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --shadow-xl:0 24px 60px rgba(0,0,0,.1),0 8px 20px rgba(0,0,0,.04);
  --font-display:'Plus Jakarta Sans',system-ui,sans-serif;
  --font-body:'Manrope',system-ui,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);
}

html{font-size:15px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(196,30,58,.03),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(196,30,58,.02),transparent);
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text4);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ─── Selection ─── */
::selection{background:rgba(196,30,58,.12);color:var(--text)}

/* ─── Header ─── */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(248,247,244,.72);backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
  padding:0 2.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:.65rem}
.logo-icon{
  width:36px;height:36px;background:var(--red);border-radius:9px;
  display:grid;place-items:center;font-weight:800;color:#fff;font-size:.95rem;
  font-family:var(--font-display);letter-spacing:-.02em;
  box-shadow:0 2px 8px rgba(196,30,58,.3),inset 0 1px 0 rgba(255,255,255,.15);
  transition:transform .2s var(--ease-spring),box-shadow .2s var(--ease);
}
.logo:hover .logo-icon{transform:scale(1.05) rotate(-2deg);box-shadow:0 4px 16px rgba(196,30,58,.35),inset 0 1px 0 rgba(255,255,255,.15)}
.logo-text{font-family:var(--font-display);font-size:1.2rem;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.logo-text span{color:var(--red)}
.header-right{display:flex;align-items:center;gap:.75rem}
.api-status{
  display:flex;align-items:center;gap:.45rem;
  padding:.35rem .75rem;border-radius:100px;
  background:var(--success-bg);border:1px solid rgba(22,163,74,.15);
  font-size:.7rem;font-weight:600;color:var(--success);letter-spacing:.01em;
  transition:all .2s var(--ease);
}
.api-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.api-dot.connected{background:var(--success);box-shadow:0 0 0 3px rgba(22,163,74,.15)}

/* ─── Main Layout ─── */
.main{max-width:1280px;margin:0 auto;padding:2rem 2.5rem 4rem}

/* ─── Upload Zone ─── */
.upload-zone{
  position:relative;
  border:2px dashed var(--border2);border-radius:var(--radius-xl);
  padding:4rem 2rem;text-align:center;cursor:pointer;
  transition:all .4s var(--ease);
  background:var(--surface);
  box-shadow:var(--shadow-xs);overflow:hidden;
}
.upload-zone::after{
  content:'';position:absolute;inset:-1px;border-radius:inherit;
  background:linear-gradient(135deg,rgba(196,30,58,.08),transparent 40%,transparent 60%,rgba(196,30,58,.04));
  opacity:0;transition:opacity .4s var(--ease);pointer-events:none;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--red);border-style:solid;
  transform:translateY(-3px);box-shadow:var(--shadow-lg);
}
.upload-zone:hover::after,.upload-zone.dragover::after{opacity:1}
.upload-zone *{position:relative;z-index:1}
.upload-icon{
  width:56px;height:56px;margin:0 auto 1.25rem;
  border-radius:14px;
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border:1px solid var(--border);
  display:grid;place-items:center;transition:all .4s var(--ease-spring);
}
.upload-zone:hover .upload-icon{
  background:var(--red);border-color:var(--red);
  transform:scale(1.08) translateY(-2px);
  box-shadow:0 8px 24px rgba(196,30,58,.25);
}
.upload-icon svg{width:24px;height:24px;color:var(--text3);transition:all .3s var(--ease)}
.upload-zone:hover .upload-icon svg{color:#fff}
.upload-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700;margin-bottom:.35rem;letter-spacing:-.02em}
.upload-sub{color:var(--text3);font-size:.8rem;line-height:1.6;font-weight:400}
.upload-sub strong{color:var(--red);font-weight:700}

/* ─── Controls Bar ─── */
.controls{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;
  margin-top:1.5rem;padding:.75rem 1rem;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-xs);
}
.controls-left{display:flex;align-items:center;gap:.5rem}
.controls-right{display:flex;align-items:center;gap:.5rem}
.badge{
  padding:.3rem .65rem;border-radius:6px;font-size:.7rem;font-weight:700;
  background:var(--surface2);color:var(--text2);letter-spacing:.01em;
  border:1px solid transparent;
}
.badge span{color:var(--red)}

/* ─── Buttons ─── */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.5rem .9rem;border-radius:8px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text);font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .2s var(--ease);font-family:var(--font-body);
  letter-spacing:.01em;
}
.btn:hover{background:var(--surface2);border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn:active{transform:translateY(0);box-shadow:none}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-primary{
  background:var(--red);border-color:var(--red);color:#fff;
  box-shadow:0 1px 3px rgba(196,30,58,.2),inset 0 1px 0 rgba(255,255,255,.1);
}
.btn-primary:hover:not(:disabled){
  background:var(--red-hover);border-color:var(--red-hover);
  box-shadow:0 4px 16px rgba(196,30,58,.3),inset 0 1px 0 rgba(255,255,255,.1);
  transform:translateY(-1px);
}
.btn-sm{padding:.35rem .65rem;font-size:.72rem}
.btn-ghost{background:transparent;border-color:transparent;box-shadow:none}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border);box-shadow:none}
.btn-success{background:var(--success-bg);border-color:rgba(22,163,74,.2);color:var(--success)}
.btn-success:hover{background:#DCFCE7;border-color:rgba(22,163,74,.3)}

/* ─── Queue Grid ─── */
.queue{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1rem;
  margin-top:1.25rem;
}
.queue:empty{display:none}

/* ─── Image Card ─── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;transition:all .3s var(--ease);box-shadow:var(--shadow-sm);
  animation:cardIn .5s var(--ease) both;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card-images{display:grid;grid-template-columns:1fr 1fr;position:relative}
.card-images::after{
  content:'';position:absolute;left:50%;top:8%;bottom:8%;width:1px;
  background:var(--border);transform:translateX(-.5px);z-index:2;
}
.card-img-wrap{
  position:relative;overflow:hidden;aspect-ratio:1;
  background:var(--surface2);display:grid;place-items:center;
}
.card-img-wrap img{
  width:100%;height:100%;object-fit:contain;padding:.75rem;
  transition:transform .3s var(--ease);
}
.card:hover .card-img-wrap img{transform:scale(1.02)}
.card-img-wrap.result-wrap{
  background:
    repeating-conic-gradient(var(--surface3) 0% 25%, var(--surface) 0% 50%) 50%/14px 14px;
}
.card-img-label{
  position:absolute;top:.6rem;left:.6rem;z-index:3;
  padding:.2rem .55rem;border-radius:5px;
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);color:var(--text3);
  border:1px solid var(--border);
}
.card-img-label.after{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 2px 8px rgba(196,30,58,.2)}

/* ─── Card Body ─── */
.card-body{padding:.65rem 1rem .4rem}
.card-name{
  font-family:var(--font-display);
  font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:.45rem;letter-spacing:-.01em;
}
.card-progress{
  height:2.5px;border-radius:10px;background:var(--surface3);overflow:hidden;margin-bottom:.3rem;
}
.card-progress-bar{
  height:100%;width:0%;border-radius:10px;
  background:linear-gradient(90deg,var(--red),var(--red-hover));
  transition:width .4s var(--ease);
}
.card-progress-bar.done{background:var(--success)}
.card-progress-bar.error{background:var(--error)}

.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:.2rem .85rem .65rem;
}
.card-status{font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:.35rem;font-weight:500}
.card-status .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-queued{background:var(--text4)}
.dot-processing{background:var(--warning);box-shadow:0 0 0 3px rgba(217,119,6,.12);animation:pulse 1.5s ease infinite}
.dot-done{background:var(--success);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.dot-error{background:var(--error);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

.card-actions{display:flex;gap:.25rem}

/* ─── Spinner ─── */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.spinner{
  width:28px;height:28px;
  border:2.5px solid var(--surface3);border-top-color:var(--red);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-size:.65rem;color:var(--text3);font-weight:600;font-family:var(--font-display);letter-spacing:.02em}

/* ─── Retry Button ─── */
.btn-retry{
  background:var(--error-bg);border-color:rgba(220,38,38,.15);color:var(--error);
  font-size:.68rem;padding:.25rem .55rem;font-weight:700;
}
.btn-retry:hover{background:#FEE2E2;border-color:rgba(220,38,38,.25);transform:translateY(-1px)}

/* ─── Compare Modal ─── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(24,24,27,.5);
  backdrop-filter:blur(16px) saturate(120%);
  -webkit-backdrop-filter:blur(16px) saturate(120%);
  display:none;place-items:center;
  animation:fadeIn .15s var(--ease);
}
.modal-overlay.active{display:grid}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);
  padding:1.75rem;max-width:960px;width:95%;max-height:90vh;overflow:auto;
  box-shadow:var(--shadow-xl);
  animation:modalIn .3s var(--ease-spring);
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-family:var(--font-display);font-size:1.15rem;font-weight:800;letter-spacing:-.02em}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text3);cursor:pointer;font-size:1.1rem;
  display:grid;place-items:center;transition:all .2s var(--ease);
}
.modal-close:hover{background:var(--red);border-color:var(--red);color:#fff;transform:rotate(90deg)}
.modal-compare{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.modal-compare>div>div:first-child{
  font-family:var(--font-display);font-size:.65rem;color:var(--text3);
  margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;
}
.modal-compare img{width:100%;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm)}

/* ─── Toast ─── */
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:500;display:flex;flex-direction:column;gap:.5rem}
.toast{
  padding:.6rem 1rem;border-radius:var(--radius);font-size:.78rem;font-weight:600;
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  box-shadow:var(--shadow-lg);font-family:var(--font-body);
  animation:toastIn .35s var(--ease-spring);min-width:220px;
  display:flex;align-items:center;gap:.5rem;
}
.toast.error{border-color:rgba(220,38,38,.2);background:var(--error-bg);color:var(--error)}
.toast.success{border-color:rgba(22,163,74,.2);background:var(--success-bg);color:var(--success)}
@keyframes toastIn{from{opacity:0;transform:translateX(16px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}

/* ─── Responsive ─── */
@media(max-width:768px){
  .header{padding:0 1.25rem;height:56px}
  .main{padding:1.25rem 1.25rem 3rem}
  .queue{grid-template-columns:1fr}
  .upload-zone{padding:2.5rem 1.25rem;border-radius:var(--radius-lg)}
  .controls{flex-direction:column;align-items:stretch}
  .controls-left,.controls-right{justify-content:center}
  .modal-compare{grid-template-columns:1fr}
  .modal{padding:1.25rem;border-radius:var(--radius-lg)}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">M</div>
    <div class="logo-text">Photo <span>Studio</span></div>
  </div>
  <div class="header-right">
    <div class="api-status">
      <div class="api-dot connected"></div>
      <span>Connected</span>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Upload Zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>
    </div>
    <div class="upload-title">Drop product images here</div>
    <div class="upload-sub">or click to browse &mdash; supports <strong>PNG, JPG, WebP</strong> &mdash; bulk upload enabled</div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
  </div>

  <!-- Controls -->
  <div class="controls" id="controls" style="display:none">
    <div class="controls-left">
      <div class="badge"><span id="totalCount">0</span> images</div>
      <div class="badge">Done: <span id="doneCount">0</span></div>
      <div class="badge" id="processingBadge" style="display:none;border-color:rgba(217,119,6,.2);background:var(--warning-bg);color:var(--warning)">
        <span style="color:var(--warning)">Processing...</span>
      </div>
    </div>
    <div class="controls-right">
      <button class="btn btn-sm" onclick="addMore()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg>
        Add More
      </button>
      <button class="btn btn-sm" id="btnClear" onclick="clearAll()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        Clear
      </button>
      <button class="btn btn-sm btn-primary" id="btnProcess" onclick="processAll()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Generate All
      </button>
      <button class="btn btn-sm btn-success" id="btnDownloadAll" onclick="downloadAll()" style="display:none">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v12m0 0l-4-4m4 4l4-4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        Download All
      </button>
    </div>
  </div>

  <!-- Queue Grid -->
  <div class="queue" id="queue"></div>
</main>

<!-- Compare Modal -->
<div class="modal-overlay" id="compareModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="compareTitle">Compare</div>
      <button class="modal-close" onclick="closeCompare()">&times;</button>
    </div>
    <div class="modal-compare">
      <div>
        <div>Original</div>
        <img id="compareBefore" src="">
      </div>
      <div>
        <div>Enhanced</div>
        <img id="compareAfter" src="">
      </div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>

<script>
// ─── State ───
let queue = [];
let processing = false;
const MODEL = 'google/nano-banana-edit';
const PROMPT = 'img2img, preserve product exactly. Professional e-commerce product photograph on pure white infinity-curve studio background. Product must remain IDENTICAL in shape, color, texture, detail. Clean pure white #FFFFFF background. Professional studio lighting, soft even illumination from all sides. Elegant soft contact shadow beneath product for depth. Product centered with balanced padding. Sharp focus, 8k resolution, photorealistic Amazon-style product listing photo. Commercial quality, clean professional finish.';

// ─── Upload Zone ───
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function addMore() { fileInput.click(); }

const IMG_EXTS = ['png','jpg','jpeg','webp','gif','bmp','tif','tiff','heic','heif','avif'];
function isImageFile(f) {
  const ext = (f.name.split('.').pop() || '').toLowerCase();
  return f.type.startsWith('image/') || IMG_EXTS.includes(ext);
}

function handleFiles(files) {
  if (!files.length) return;
  const imageFiles = [...files].filter(isImageFile);
  if (!imageFiles.length) return toast('Please upload image files only', 'error');

  imageFiles.forEach(file => {
    const id = Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const item = {
      id,
      file,
      name: file.name.replace(/\.[^.]+$/, ''),
      ext,
      needsConv: needsConversion(file, ext),
      status: 'queued',
      originalUrl: URL.createObjectURL(file),
      uploadData: null,
      resultDataUrl: null,
      resultBlob: null,
      predictionId: null,
      progress: 0,
      error: null,
    };
    queue.push(item);
    appendCard(item, queue.length - 1);
    // Convert odd formats (gif/tiff/bmp...) to PNG up front so the preview shows too
    if (item.needsConv) prepPreview(item);
  });
  updateControls();
  fileInput.value = '';
}

// ─── Convert file to base64 only when sending to API ───
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ─── Kie only accepts png/jpg/webp. Convert anything else (gif, tiff, bmp...) to png ───
const KIE_OK = ['image/png','image/jpeg','image/webp'];
function needsConversion(file, ext) {
  const isTiff = file.type === 'image/tiff' || ext === 'tif' || ext === 'tiff';
  const okType = KIE_OK.includes(file.type);
  const okExt = ['png','jpg','jpeg','webp'].includes(ext);
  return isTiff || (!okType && !okExt);
}

async function convertToPng(file, ext) {
  const isTiff = file.type === 'image/tiff' || ext === 'tif' || ext === 'tiff';
  const canvas = document.createElement('canvas');
  if (isTiff) {
    // Browsers can't decode TIFF natively -> use UTIF
    const buf = await file.arrayBuffer();
    const ifds = UTIF.decode(buf);
    UTIF.decodeImage(buf, ifds[0]);
    const rgba = UTIF.toRGBA8(ifds[0]);
    canvas.width = ifds[0].width;
    canvas.height = ifds[0].height;
    canvas.getContext('2d').putImageData(
      new ImageData(new Uint8ClampedArray(rgba), ifds[0].width, ifds[0].height), 0, 0);
  } else {
    // gif/bmp/avif... browser can decode these
    const bmp = await createImageBitmap(file);
    canvas.width = bmp.width;
    canvas.height = bmp.height;
    canvas.getContext('2d').drawImage(bmp, 0, 0);
    if (bmp.close) bmp.close();
  }
  return canvas.toDataURL('image/png');
}

// Kie validates by file extension, so name the upload by the REAL type
// (e.g. a .jfif is really image/jpeg -> upload as .jpg)
const EXT_BY_TYPE = { 'image/jpeg': 'jpg', 'image/png': 'png', 'image/webp': 'webp' };

// Returns { dataUrl, fileName } ready for /api/upload (converted if needed)
async function getUploadData(item) {
  if (item.uploadData) return item.uploadData;
  if (item.needsConv) {
    item.uploadData = { dataUrl: await convertToPng(item.file, item.ext), fileName: item.name + '.png' };
  } else {
    const safeExt = EXT_BY_TYPE[item.file.type] || item.ext;
    item.uploadData = { dataUrl: await fileToDataUrl(item.file), fileName: item.name + '.' + safeExt };
  }
  return item.uploadData;
}

// Convert odd formats up front so the "Before" preview renders (e.g. browser can't show tiff)
async function prepPreview(item) {
  try {
    const ud = await getUploadData(item);
    const old = item.originalUrl;
    item.originalUrl = ud.dataUrl;
    const card = document.getElementById('card-' + item.id);
    const img = card && card.querySelector('.card-img-wrap img');
    if (img) img.src = ud.dataUrl;
    if (old && old.startsWith('blob:')) URL.revokeObjectURL(old);
  } catch (e) {
    item.status = 'error';
    item.error = 'Could not read this image file';
    updateCard(item);
  }
}

// ─── Controls / counts only ───
function updateControls() {
  const controls = document.getElementById('controls');
  controls.style.display = queue.length ? 'flex' : 'none';
  document.getElementById('totalCount').textContent = queue.length;
  document.getElementById('doneCount').textContent = queue.filter(i => i.status === 'done').length;
  const doneAll = queue.filter(i => i.status === 'done').length > 1;
  document.getElementById('btnDownloadAll').style.display = doneAll ? 'inline-flex' : 'none';
}

// ─── Build one card element (incremental render) ───
function buildCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + item.id;
  card.innerHTML = `
    <div class="card-images">
      <div class="card-img-wrap">
        <span class="card-img-label">Before</span>
        <img src="${item.originalUrl}" alt="Original" loading="lazy" decoding="async">
      </div>
      <div class="card-img-wrap result-wrap" data-role="after">
        <span class="card-img-label after">After</span>
        <div class="after-content" style="color:var(--text4);font-size:.72rem;font-weight:600">Waiting</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-name" title="${item.name}.${item.ext}">${item.name}.${item.ext}</div>
      <div class="card-progress">
        <div class="card-progress-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="card-footer">
      <div class="card-status">
        <div class="dot dot-queued"></div>Queued
      </div>
      <div class="card-actions">
        <button class="btn btn-sm btn-ghost" onclick="removeItem('${item.id}')" title="Remove">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
  `;
  return card;
}

function appendCard(item, idx) {
  const container = document.getElementById('queue');
  const card = buildCard(item);
  card.style.animationDelay = (idx * 60) + 'ms';
  container.appendChild(card);
}

function statusText(item) {
  switch(item.status) {
    case 'queued': return 'Queued';
    case 'processing': return 'Generating...';
    case 'done': return 'Complete';
    case 'error': return `Error: ${item.error || 'Unknown'}`;
    default: return item.status;
  }
}

// ─── Update single card in-place ───
function updateCard(item) {
  const card = document.getElementById('card-' + item.id);
  if (!card) return;

  const bar = card.querySelector('.card-progress-bar');
  if (bar) {
    bar.style.width = item.progress + '%';
    bar.className = 'card-progress-bar' + (item.status === 'done' ? ' done' : item.status === 'error' ? ' error' : '');
  }

  const statusEl = card.querySelector('.card-status');
  if (statusEl) {
    statusEl.innerHTML = `<div class="dot dot-${item.status}"></div>${statusText(item)}`;
  }

  const afterWrap = card.querySelector('[data-role="after"]');
  if (afterWrap) {
    const existingImg = afterWrap.querySelector('img');
    const content = afterWrap.querySelector('.after-content');
    if (item.resultDataUrl) {
      if (!existingImg || existingImg.src !== item.resultDataUrl) {
        if (content) content.remove();
        if (existingImg) existingImg.remove();
        const img = document.createElement('img');
        img.src = item.resultDataUrl;
        img.alt = 'Enhanced';
        img.decoding = 'async';
        afterWrap.appendChild(img);
      }
    } else if (item.status === 'processing') {
      if (existingImg) existingImg.remove();
      if (!content || !content.classList.contains('spinner-wrap')) {
        if (content) content.remove();
        const sw = document.createElement('div');
        sw.className = 'after-content spinner-wrap';
        sw.innerHTML = `<div class="spinner"></div><div class="spinner-text">${Math.round(item.progress)}%</div>`;
        afterWrap.appendChild(sw);
      } else {
        const t = content.querySelector('.spinner-text');
        if (t) t.textContent = Math.round(item.progress) + '%';
      }
    } else {
      if (existingImg) existingImg.remove();
      if (!content || content.textContent.trim() !== 'Waiting') {
        if (content) content.remove();
        const w = document.createElement('div');
        w.className = 'after-content';
        w.style.cssText = 'color:var(--text4);font-size:.72rem;font-weight:600';
        w.textContent = 'Waiting';
        afterWrap.appendChild(w);
      }
    }
  }

  // Actions (retry / compare / download / remove)
  const actions = card.querySelector('.card-actions');
  if (actions) {
    const needsRetry = item.status === 'error';
    const needsDone = item.status === 'done';
    const has = (sel) => !!actions.querySelector(sel);
    if (needsRetry && !has('.btn-retry')) {
      actions.insertAdjacentHTML('afterbegin', `
        <button class="btn btn-sm btn-retry" onclick="retryOne('${item.id}')" title="Retry">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L3 10"/></svg>
          Retry
        </button>`);
    }
    if (!needsRetry) actions.querySelector('.btn-retry')?.remove();
    if (needsDone && !has('[data-act="compare"]')) {
      actions.insertAdjacentHTML('afterbegin', `
        <button class="btn btn-sm btn-ghost" data-act="compare" onclick="compareImage('${item.id}')" title="Compare">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="btn btn-sm btn-ghost" data-act="dl" onclick="downloadOne('${item.id}')" title="Download">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M12 4v12m0 0l-4-4m4 4l4-4"/></svg>
        </button>`);
    }
    if (!needsDone) {
      actions.querySelector('[data-act="compare"]')?.remove();
      actions.querySelector('[data-act="dl"]')?.remove();
    }
  }
}

function removeItem(id) {
  const item = queue.find(i => i.id === id);
  if (item?.originalUrl) URL.revokeObjectURL(item.originalUrl);
  if (item?.resultDataUrl) URL.revokeObjectURL(item.resultDataUrl);
  queue = queue.filter(i => i.id !== id);
  document.getElementById('card-' + id)?.remove();
  updateControls();
}

function clearAll() {
  if (processing) return toast('Wait for processing to finish', 'error');
  queue.forEach(i => {
    if (i.originalUrl) URL.revokeObjectURL(i.originalUrl);
    if (i.resultDataUrl) URL.revokeObjectURL(i.resultDataUrl);
  });
  queue = [];
  document.getElementById('queue').innerHTML = '';
  updateControls();
}

// ─── Retry single failed image ───
async function retryOne(id) {
  const item = queue.find(i => i.id === id);
  if (!item || item.status !== 'error') return;
  item.status = 'queued';
  item.progress = 0;
  item.error = null;
  if (item.resultDataUrl) URL.revokeObjectURL(item.resultDataUrl);
  item.resultDataUrl = null;
  item.resultBlob = null;
  updateCard(item);
  await processOne(item);
  updateControls();
}

// ─── Processing ───
async function processAll() {
  if (processing) return;

  const pending = queue.filter(i => i.status === 'queued' || i.status === 'error');
  if (!pending.length) return toast('No images to process', 'error');

  processing = true;
  document.getElementById('btnProcess').disabled = true;
  document.getElementById('processingBadge').style.display = 'inline-flex';

  for (const item of pending) {
    if (!processing) break;
    await processOne(item);
  }

  processing = false;
  document.getElementById('btnProcess').disabled = false;
  document.getElementById('processingBadge').style.display = 'none';
  updateControls();

  const doneCount = queue.filter(i => i.status === 'done').length;
  if (doneCount) toast(`${doneCount} image${doneCount > 1 ? 's' : ''} generated!`, 'success');
}

async function processOne(item) {
  item.status = 'processing';
  item.progress = 10;
  updateCard(item);

  try {
    // 1. Upload image -> Kie needs a hosted URL (png/jpg/webp); odd formats get converted first
    const ud = await getUploadData(item);
    const upRes = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        base64Data: ud.dataUrl,
        fileName: ud.fileName,
      }),
    });
    const upData = await upRes.json().catch(() => ({}));
    const imageUrl = upData?.data?.downloadUrl;
    if (!upRes.ok || !imageUrl) {
      throw new Error(upData.msg || upData.error || `Upload failed ${upRes.status}`);
    }
    item.progress = 25;
    updateCard(item);

    // 2. Create generation task
    const createRes = await fetch('/api/predictions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        input: {
          prompt: PROMPT,
          image_urls: [imageUrl],
          output_format: 'jpeg',
          aspect_ratio: '1:1',
        },
      }),
    });

    const createData = await createRes.json().catch(() => ({}));
    const taskId = createData?.data?.taskId;
    if (!createRes.ok || !taskId) {
      throw new Error(createData.msg || createData.error || `API error ${createRes.status}`);
    }
    item.predictionId = taskId;
    item.progress = 35;
    updateCard(item);

    // 3. Poll until success/fail
    let result = null;
    for (let attempt = 0; attempt < 90; attempt++) {
      await sleep(2000);

      const pollRes = await fetch(`/api/predictions/${taskId}`);
      const pollData = await pollRes.json().catch(() => ({}));
      const d = pollData.data || {};

      if (d.state === 'success') {
        const parsed = JSON.parse(d.resultJson || '{}');
        result = parsed.resultUrls && parsed.resultUrls[0];
        break;
      }
      if (d.state === 'fail') {
        throw new Error(d.failMsg || 'Generation failed');
      }

      item.progress = Math.min(90, 35 + (attempt / 90) * 55);
      updateCard(item);
    }

    if (!result) throw new Error('Timeout - generation took too long');

    item.progress = 92;
    updateCard(item);

    const imgRes = await fetch('/api/download?url=' + encodeURIComponent(result));
    if (!imgRes.ok) throw new Error('Failed to download generated image');

    const blob = await imgRes.blob();
    item.resultDataUrl = URL.createObjectURL(blob);
    item.resultBlob = blob;
    item.status = 'done';
    item.progress = 100;
    item.uploadData = null;

  } catch (e) {
    item.status = 'error';
    item.error = e.message?.substring(0, 60);
    item.progress = 100;
    console.error('Process error:', e);
  }

  updateCard(item);
  updateControls();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Downloads ───
function downloadOne(id) {
  const item = queue.find(i => i.id === id);
  if (!item?.resultBlob) return;

  const a = document.createElement('a');
  a.href = item.resultDataUrl;
  a.download = item.name + '.jpg';
  a.click();
}

async function downloadAll() {
  const doneItems = queue.filter(i => i.status === 'done' && i.resultBlob);
  if (!doneItems.length) return;

  if (doneItems.length === 1) return downloadOne(doneItems[0].id);

  toast('Creating ZIP...', 'success');
  const zip = new JSZip();

  for (const item of doneItems) {
    const arrayBuffer = await item.resultBlob.arrayBuffer();
    zip.file(item.name + '.jpg', arrayBuffer);
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maliks_products_enhanced.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── Compare Modal ───
function compareImage(id) {
  const item = queue.find(i => i.id === id);
  if (!item) return;
  document.getElementById('compareBefore').src = item.originalUrl;
  document.getElementById('compareAfter').src = item.resultDataUrl;
  document.getElementById('compareTitle').textContent = item.name;
  document.getElementById('compareModal').classList.add('active');
}

function closeCompare() {
  document.getElementById('compareModal').classList.remove('active');
}

document.getElementById('compareModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCompare();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCompare();
});

// ─── Toast ───
function toast(msg, type = '') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
}
</script>
